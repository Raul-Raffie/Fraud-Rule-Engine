services:
  transaction-db:
    image: postgres:16
    container_name: transaction-db
    environment:
      POSTGRES_DB: fraud_transactions_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - transaction_data:/var/lib/postgresql/data

  fraud-case-db:
    image: postgres:16
    container_name: fraud-case-db
    environment:
      POSTGRES_DB: fraud_cases_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - fraud_case_data:/var/lib/postgresql/data

  fraud-case-service:
    build:
      context: ./fraud-case-service
    container_name: fraud-case-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://fraud-case-db:5432/fraud_cases_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      INTERNAL_SERVICE_AUTH_TOKEN: ${INTERNAL_SERVICE_AUTH_TOKEN:-raul}
    depends_on:
      - fraud-case-db
    ports:
      - "8082:8082"

  fraud-rule-engine-service:
    build:
      context: ./fraud-rule-engine-service
    container_name: fraud-rule-engine-service
    environment:
      SERVER_PORT: 8081
      FRAUD_CASE_SERVICE_BASE_URL: http://fraud-case-service:8082
      INTERNAL_SERVICE_AUTH_TOKEN: ${INTERNAL_SERVICE_AUTH_TOKEN:-raul}
    depends_on:
      - fraud-case-service
    ports:
      - "8081:8081"

  transaction-service:
    build:
      context: ./transaction-service
    container_name: transaction-service
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://transaction-db:5432/fraud_transactions_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      FRAUD_RULE_ENGINE_BASE_URL: http://fraud-rule-engine-service:8081
      INTERNAL_SERVICE_AUTH_TOKEN: ${INTERNAL_SERVICE_AUTH_TOKEN:-raul}
    depends_on:
      - transaction-db
      - fraud-rule-engine-service
    ports:
      - "8080:8080"

volumes:
  transaction_data:
  fraud_case_data:
